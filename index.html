<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Result Management System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">


    <!-- LOGO SECTION -->

    <div class="logo-section">

        <img src="logo.png" class="logo" alt="College Logo">

        <h2>SASI INSTITUTE OF TECHNOLOGY AND ENGINEERING</h2>

        <h3>Student Result Portal</h3>

        <p class="address">Tadepalligudem, Andhra Pradesh</p>

    </div>



    <!-- SEARCH -->

    <div class="search-box">

        <input type="text" id="hallticket" placeholder="Enter Hall Ticket Number">

        <button onclick="getResult()">🔍 Get Result</button>

    </div>



    <!-- RESULT -->

    <div id="result"></div>


</div>


<footer>

    © 2026 SASI Institute of Technology and Engineering | All Rights Reserved

</footer>



<script src="script.js"></script>

</body>

</html>
